<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Asset Detail</title>
    <style>
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #f8fbf6;
        color: #16241d;
      }
      .wrap {
        max-width: 960px;
        margin: 20px auto;
        padding: 14px;
      }
      .card {
        background: white;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
        box-shadow: 0 8px 20px rgba(0, 50, 20, 0.08);
      }
      .warn {
        color: #8a3304;
        background: #fff2eb;
        border-radius: 10px;
        padding: 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #cbdccc;
        padding: 9px;
        font-size: 16px;
      }
      button {
        margin-top: 10px;
        border: 0;
        border-radius: 10px;
        background: #109965;
        color: #fff;
        padding: 10px 14px;
        font-size: 16px;
      }
      video {
        width: 100%;
        max-height: 420px;
        background: #000;
        border-radius: 12px;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a href="/admin/videos">← 動画一覧へ戻る</a>
      <h1>動画素材詳細</h1>
      <p id="status" class="mono"></p>
      <p id="msg"></p>

      <section class="card">
        <h2>raw動画</h2>
        <p class="warn">raw動画は投稿素材として未使用です。必ずUI除去済みclean動画を使用してください。</p>
        <video id="rawVideo" controls></video>
        <p id="rawPath" class="mono"></p>
      </section>

      <section class="card">
        <h2>UI除去設定</h2>
        <div class="grid">
          <label>上を削るpx<input id="uiCropTop" type="number" min="0" value="0" /></label>
          <label>下を削るpx<input id="uiCropBottom" type="number" min="0" value="0" /></label>
          <label>左を削るpx<input id="uiCropLeft" type="number" min="0" value="0" /></label>
          <label>右を削るpx<input id="uiCropRight" type="number" min="0" value="0" /></label>
        </div>
        <button id="cleanBtn">UI除去を実行</button>
      </section>

      <section class="card">
        <h2>clean動画</h2>
        <video id="cleanVideo" controls></video>
        <p id="cleanPath" class="mono"></p>
      </section>
    </div>
    <script src="/admin/videos/detail.js"></script>
  </body>
</html>
