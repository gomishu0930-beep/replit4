<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Post Drafts With Clip</title>
    <style>
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #f3faf6;
        color: #16261d;
      }
      .wrap {
        max-width: 980px;
        margin: 20px auto;
        padding: 14px;
      }
      .card {
        background: #fff;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
        box-shadow: 0 8px 20px rgba(0, 60, 30, 0.08);
      }
      .clip-list {
        display: grid;
        gap: 10px;
      }
      .clip-item {
        border: 1px solid #d2e6da;
        border-radius: 10px;
        padding: 10px;
      }
      .draft-list {
        display: grid;
        gap: 10px;
      }
      .draft-item {
        border: 1px solid #dbe3ee;
        border-radius: 10px;
        padding: 10px;
      }
      video {
        width: 100%;
        max-height: 280px;
        background: #000;
        border-radius: 10px;
      }
      textarea {
        width: 100%;
        min-height: 80px;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      button, select, input {
        font-size: 15px;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: #0d8f5d;
        color: #fff;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a href="/admin/myfans">← MyFans管理へ戻る</a>
      <h1>投稿素材作成（clip付き）</h1>
      <p id="msg"></p>

      <section class="card">
        <h2>対象Affiliate Job</h2>
        <div class="row">
          <label>affiliateJobId <input id="affiliateJobId" /></label>
          <button id="loadJobBtn">読み込み</button>
        </div>
        <p id="affiliateUrl" class="mono"></p>
      </section>

      <section class="card">
        <h2>approved/generated clip一覧</h2>
        <div id="clips" class="clip-list">読み込み中...</div>
      </section>

      <section class="card">
        <h2>投稿文生成</h2>
        <div class="row">
          <label>tone
            <select id="tone">
              <option value="natural">natural</option>
              <option value="calm">calm</option>
              <option value="energetic">energetic</option>
            </select>
          </label>
          <label>variantCount
            <select id="variantCount">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </label>
        </div>
        <p class="mono">選択clip (optional): <span id="selectedClipId">(none)</span></p>
        <button id="generateBtn">Claudeで投稿文生成</button>
      </section>

      <section class="card">
        <h2>生成draft一覧</h2>
        <div id="drafts" class="draft-list">まだ生成されていません。</div>
      </section>
    </div>
    <script src="/admin/posts/create-with-clip/app.js"></script>
  </body>
</html>
