<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyFans Mobile Manual</title>
    <style>
      :root {
        --bg: #f4fbf8;
        --card: #ffffff;
        --text: #12231e;
        --accent: #0b9a64;
        --warn: #8c2f00;
      }
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: radial-gradient(circle at top, #e8fff5, var(--bg));
        color: var(--text);
      }
      .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 14px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 60, 30, 0.09);
        padding: 14px;
        margin: 10px 0;
      }
      .source-url {
        font-size: 18px;
        line-height: 1.5;
        word-break: break-all;
        background: #f3fff9;
        border: 1px solid #b7ecd5;
        border-radius: 10px;
        padding: 10px;
      }
      input, button {
        font-size: 16px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #c8d9cf;
        padding: 11px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px;
        margin-top: 8px;
      }
      .primary {
        background: var(--accent);
        color: white;
      }
      .secondary {
        background: #eef4f1;
      }
      .danger {
        background: #fff4ef;
        color: var(--warn);
      }
      .msg {
        min-height: 1.4em;
      }
      .muted {
        color: #4b5e58;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>MyFans スマホ半手動取得</h1>
      <p class="muted">1件ずつ処理します。bot検証/CAPTCHA/SMS認証は必ず手動対応してください。</p>

      <section class="card">
        <h2>現在の元URL</h2>
        <div id="sourceUrl" class="source-url">読み込み中...</div>
        <button id="copySourceBtn" class="secondary">元URLをコピー</button>
        <button id="openGeneratorBtn" class="secondary">MyFans URL生成画面を開く</button>
      </section>

      <section class="card">
        <h2>生成された affiliateUrl</h2>
        <input id="affiliateUrl" placeholder="https://..." />
        <button id="saveNextBtn" class="primary">保存して次へ</button>
      </section>

      <section class="card">
        <h2>スキップ</h2>
        <button id="skipUnsupportedBtn" class="danger">対象外URLとしてスキップ</button>
        <button id="skipDisabledBtn" class="danger">許諾OFFとしてスキップ</button>
        <button id="skipErrorBtn" class="danger">エラーとしてスキップ</button>
      </section>

      <p id="msg" class="msg muted"></p>
    </div>

    <script src="/admin/myfans/mobile/app.js"></script>
  </body>
</html>
