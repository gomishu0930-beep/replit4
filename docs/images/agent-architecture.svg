<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex Agent Architecture</title>
  <desc id="desc">DiscordとWeb UIが共通Agent APIを呼び、分析、作品選定、Draft、Compliance、承認、学習へ流れる構成図</desc>
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #121a2f; stroke: #334155; stroke-width: 2; rx: 16; }
      .box { fill: #18233d; stroke: #4b6584; stroke-width: 1.8; rx: 12; }
      .box2 { fill: #123127; stroke: #22c55e; stroke-width: 1.8; rx: 12; }
      .box3 { fill: #34231b; stroke: #f59e0b; stroke-width: 1.8; rx: 12; }
      .box4 { fill: #321827; stroke: #f472b6; stroke-width: 1.8; rx: 12; }
      .title { fill: #f8fafc; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #f8fafc; font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #cbd5e1; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #94a3b8; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrow-green { stroke: #22c55e; stroke-width: 2.5; fill: none; marker-end: url(#arrow-green); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="720"/>
  <text x="48" y="52" class="title">現在の実装: Codex中心の共通Agent基盤</text>
  <text x="48" y="78" class="small">DiscordとWeb UIは別々に分析せず、同じAgent API / AgentRun / DraftServiceを使います。</text>

  <rect x="48" y="118" width="250" height="164" class="panel"/>
  <text x="72" y="154" class="label">入口</text>
  <rect x="72" y="176" width="202" height="42" class="box"/>
  <text x="92" y="202" class="small">Discord Bot</text>
  <rect x="72" y="230" width="202" height="42" class="box"/>
  <text x="92" y="256" class="small">既存Web UI</text>

  <rect x="390" y="118" width="350" height="164" class="box2"/>
  <text x="420" y="154" class="label">Common Agent API</text>
  <text x="420" y="184" class="small">/api/agent/runs/market-scan</text>
  <text x="420" y="208" class="small">/api/agent/runs/compare-own</text>
  <text x="420" y="232" class="small">/api/drafts / approve / reject / schedule</text>
  <text x="420" y="256" class="tiny">run_id / draft_id / risk_flagsを共通管理</text>

  <rect x="842" y="118" width="290" height="164" class="panel"/>
  <text x="866" y="154" class="label">保存・追跡</text>
  <text x="866" y="184" class="small">AgentRunService</text>
  <text x="866" y="208" class="small">DraftService</text>
  <text x="866" y="232" class="small">PostQueue</text>
  <text x="866" y="256" class="small">AgentLearningStore</text>

  <path class="arrow-green" d="M 298 200 L 382 200"/>
  <path class="arrow-green" d="M 740 200 L 834 200"/>

  <rect x="48" y="360" width="1084" height="272" class="panel"/>
  <text x="72" y="398" class="label">内部サービス</text>

  <rect x="72" y="428" width="190" height="138" class="box"/>
  <text x="92" y="458" class="small">XConnector</text>
  <text x="92" y="484" class="tiny">X API pagination</text>
  <text x="92" y="506" class="tiny">最大500件</text>
  <text x="92" y="528" class="tiny">growth_score</text>

  <rect x="288" y="428" width="190" height="138" class="box"/>
  <text x="308" y="458" class="small">OwnPostService</text>
  <text x="308" y="484" class="tiny">過去投稿</text>
  <text x="308" y="506" class="tiny">impression / click</text>
  <text x="308" y="528" class="tiny">差分抽出</text>

  <rect x="504" y="428" width="190" height="138" class="box3"/>
  <text x="524" y="458" class="small">WorkAnalysis</text>
  <text x="524" y="484" class="tiny">FANZA作品スコア</text>
  <text x="524" y="506" class="tiny">レビュー / セール</text>
  <text x="524" y="528" class="tiny">公式素材確認</text>

  <rect x="720" y="428" width="190" height="138" class="box2"/>
  <text x="740" y="458" class="small">DraftAgent</text>
  <text x="740" y="484" class="tiny">作品 / 文面 / CTA</text>
  <text x="740" y="506" class="tiny">画像 / 動画 / 時間</text>
  <text x="740" y="528" class="tiny">reason / confidence</text>

  <rect x="936" y="428" width="172" height="138" class="box4"/>
  <text x="956" y="458" class="small">Compliance</text>
  <text x="956" y="484" class="tiny">PR表記</text>
  <text x="956" y="506" class="tiny">未成年/非同意</text>
  <text x="956" y="528" class="tiny">権利/Xリスク</text>

  <path class="arrow" d="M 262 497 L 280 497"/>
  <path class="arrow" d="M 478 497 L 496 497"/>
  <path class="arrow" d="M 694 497 L 712 497"/>
  <path class="arrow" d="M 910 497 L 928 497"/>

  <path class="arrow" d="M 565 282 L 565 352"/>
  <text x="584" y="326" class="tiny">同じrun_idで全工程を追跡</text>
</svg>
