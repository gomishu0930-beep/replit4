<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Draft Approval and Learning Loop</title>
  <desc id="desc">draftの承認、却下、予約、投稿後メトリクスが学習データとして次回提案に戻る図</desc>
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .box { fill: #172033; stroke: #475569; stroke-width: 2; rx: 18; }
      .green { fill: #123127; stroke: #22c55e; stroke-width: 2; rx: 18; }
      .red { fill: #321827; stroke: #fb7185; stroke-width: 2; rx: 18; }
      .amber { fill: #34231b; stroke: #f59e0b; stroke-width: 2; rx: 18; }
      .title { fill: #f8fafc; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #f8fafc; font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #cbd5e1; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #94a3b8; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #22c55e; stroke-width: 3; fill: none; marker-end: url(#arrow-green); stroke-dasharray: 8 7; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="720"/>
  <text x="48" y="52" class="title">承認付き運用と学習ループ</text>
  <text x="48" y="78" class="small">完全自動投稿ではなく、人間が承認/却下し、その判断と投稿後成果を次回提案に戻します。</text>

  <rect x="76" y="132" width="230" height="122" class="box"/>
  <text x="104" y="168" class="label">Draft候補</text>
  <text x="104" y="200" class="small">draft_id</text>
  <text x="104" y="224" class="tiny">run_idと紐づく</text>

  <rect x="476" y="132" width="230" height="122" class="green"/>
  <text x="504" y="168" class="label">承認</text>
  <text x="504" y="200" class="small">UI / Discordボタン</text>
  <text x="504" y="224" class="tiny">approval reasonを保存</text>

  <rect x="876" y="132" width="230" height="122" class="amber"/>
  <text x="904" y="168" class="label">予約/投稿キュー</text>
  <text x="904" y="200" class="small">queue item</text>
  <text x="904" y="224" class="tiny">承認後のみ投稿対象</text>

  <path class="arrow" d="M 306 193 L 468 193"/>
  <path class="arrow" d="M 706 193 L 868 193"/>

  <rect x="276" y="330" width="230" height="122" class="red"/>
  <text x="304" y="366" class="label">却下</text>
  <text x="304" y="398" class="small">UI / Discord</text>
  <text x="304" y="422" class="tiny">rejection reasonを保存</text>

  <rect x="676" y="330" width="230" height="122" class="box"/>
  <text x="704" y="366" class="label">投稿後結果</text>
  <text x="704" y="398" class="small">impression / clicks</text>
  <text x="704" y="422" class="tiny">conversion / revenueは次フェーズ強化</text>

  <path class="arrow" d="M 191 254 C 191 390 254 390 268 390"/>
  <path class="arrow" d="M 991 254 C 991 390 926 390 914 390"/>

  <rect x="370" y="560" width="440" height="94" class="green"/>
  <text x="402" y="596" class="label">AgentLearningStore</text>
  <text x="402" y="626" class="small">承認・却下・投稿済み・失敗を保存</text>

  <path class="arrow" d="M 391 452 L 520 552"/>
  <path class="arrow" d="M 791 452 L 660 552"/>
  <path class="loop" d="M 370 608 C 160 608 110 352 168 262"/>
  <text x="86" y="628" class="tiny">次回の作品選定・CTA・媒体・時間の重みに反映</text>
</svg>
